name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Patch config for GitHub Pages
        run: |
          REPO_NAME=$(echo "$GITHUB_REPOSITORY" | cut -d'/' -f2)

          # Update next.config.ts for static export with basePath
          cat > next.config.ts << NEXTEOF
          import type { NextConfig } from "next";
          import withPWA from "next-pwa";

          const nextConfig: NextConfig = {
            output: "export",
            basePath: "/${REPO_NAME}",
            images: {
              unoptimized: true,
            },
          };

          const pwaConfig = withPWA({
            dest: "public",
            register: true,
            skipWaiting: true,
            disable: process.env.NODE_ENV === "development",
          });

          export default pwaConfig(nextConfig);
          NEXTEOF

          # Fix indentation (heredoc above adds extra spaces)
          sed -i 's/^          //' next.config.ts

          # Update manifest.json paths
          sed -i "s|\"start_url\": \"/\"|\"start_url\": \"/${REPO_NAME}/\"|" public/manifest.json
          sed -i "s|\"src\": \"/icon-|\"src\": \"/${REPO_NAME}/icon-|g" public/manifest.json

      - name: Build
        run: pnpm build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
