name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Patch config for GitHub Pages
        run: |
          REPO_NAME=$(echo "$GITHUB_REPOSITORY" | cut -d'/' -f2)

          node -e "
            const fs = require('fs');
            const repoName = process.argv[1];

            // Patch next.config.ts
            const config = fs.readFileSync('next.config.ts', 'utf8');
            const patched = config.replace(
              /const nextConfig: NextConfig = \{[^}]*\};/s,
              'const nextConfig: NextConfig = {\n  output: \"export\",\n  basePath: \"/' + repoName + '\",\n  images: {\n    unoptimized: true,\n  },\n};'
            );
            fs.writeFileSync('next.config.ts', patched);

            // Patch manifest.json
            const manifest = JSON.parse(fs.readFileSync('public/manifest.json', 'utf8'));
            manifest.start_url = '/' + repoName + '/';
            manifest.icons = manifest.icons.map(icon => ({
              ...icon,
              src: '/' + repoName + icon.src
            }));
            fs.writeFileSync('public/manifest.json', JSON.stringify(manifest, null, 2));
          " "$REPO_NAME"

          echo "Patched next.config.ts:"
          cat next.config.ts
          echo ""
          echo "Patched manifest.json:"
          cat public/manifest.json

      - name: Build
        run: pnpm build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
